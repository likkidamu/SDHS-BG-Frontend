<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDHS BG Program</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f4f6fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: #1a1a2e;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      border-radius: 18px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .divider {
      height: 1px;
      background: #eee;
      margin-bottom: 24px;
    }

    a.link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f4f6fb;
      border: 1px solid #e0e4ef;
      color: #0f3460;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 10px;
      transition: background 0.15s;
    }

    a.link:hover {
      background: #e8ecf8;
    }

    footer {
      margin-top: 32px;
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">&#x1F4D6;</div>
    <h1>SDHS BG Program</h1>
    <p class="subtitle">
      A mobile application by Sri Datta Human Services for managing the
      Bhagavad Gita Memorization Program — volunteers, students, and teachers.
    </p>
    <div class="divider"></div>
    <a class="link" href="./privacy-policy.html">
      &#x1F512;&nbsp; Privacy Policy
    </a>
  </div>

  <footer>
    &copy; 2026 Sri Datta Human Services &nbsp;·&nbsp; <a href="mailto:bg@sdhs.in" style="color:#bbb;">bg@sdhs.in</a>
  </footer>

</body>
</html>
